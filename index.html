<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Masters Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--masters-green:#006747;
--masters-dark:#004d35;
--masters-yellow:#f2c744;
--masters-gold:#d4a843;
--cream:#fdf8ef;
--cream-dark:#f5edd8;
--text:#1a1a1a;
--text-light:#5a5a5a;
--text-muted:#8a8a8a;
--cut-red:#c0392b;
--birdie-red:#cc0000;
--bogey-blue:#2563eb;
--card-bg:#ffffff;
--card-border:#e8e0d0;
--shadow:0 1px 3px rgba(0,0,0,.08);
--shadow-md:0 4px 12px rgba(0,0,0,.1);
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* HEADER */
.header{background:#006747;color:#ffffff;padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,50,30,.3)}
.header-inner{max-width:900px;margin:0 auto;padding:20px 16px 16px;text-align:center}
.header h1{font-family:‘Playfair Display’,Georgia,serif;font-weight:800;font-size:1.8rem;letter-spacing:.02em;line-height:1.1;margin-bottom:2px;color:#ffffff;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.header-subtitle{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.85);font-weight:500;margin-top:4px}
.header-status{display:inline-block;margin-top:8px;padding:3px 12px;border-radius:20px;font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#ffffff}
.status-live{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#ffffff;animation:pulse-glow 2s ease-in-out infinite}
.status-pre{background:rgba(242,199,68,.25);border:1px solid rgba(242,199,68,.5);color:#f2c744}
.status-final{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#ffffff}
@keyframes pulse-glow{0%,100%{opacity:1}50%{opacity:.6}}

/* TABS */
.tabs{display:flex;max-width:900px;margin:0 auto;padding:0 16px}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:.8rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;color:var(–text-muted);transition:all .2s}
.tab.active{color:#006747;border-bottom-color:#006747}
.tab:hover{color:#004d35}

/* LAST UPDATED */
.last-updated{text-align:center;padding:8px 16px 4px;font-size:.7rem;color:var(–text-muted);font-family:‘DM Mono’,monospace}

/* SEARCH */
.search-wrap{max-width:900px;margin:0 auto;padding:8px 16px}
.search-input{width:100%;padding:10px 14px;border:1.5px solid var(–card-border);border-radius:8px;font-size:.85rem;font-family:‘DM Sans’,sans-serif;background:white;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(–masters-green)}
.search-input::placeholder{color:var(–text-muted)}

/* POOL TABLE */
.pool-section{max-width:900px;margin:0 auto;padding:8px 16px 40px}
.pool-row{background:#ffffff;border:1.5px solid #d9d0c1;border-radius:12px;margin-bottom:8px;overflow:hidden;transition:all .15s ease;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pool-row:hover{box-shadow:0 3px 10px rgba(0,0,0,.1);border-color:#c0b8a8}
.pool-row:active{transform:scale(.985);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.pool-row.dq .pool-main{opacity:.55}
.pool-main{display:grid;grid-template-columns:36px 1fr auto;align-items:center;padding:12px 16px;gap:8px}
.pool-rank{font-family:‘DM Mono’,monospace;font-weight:600;font-size:.8rem;color:var(–text-muted);text-align:center}
.pool-rank.top3{color:var(–masters-gold);font-weight:700}
.pool-name{font-weight:600;font-size:.9rem}
.pool-score{font-family:‘DM Mono’,monospace;font-weight:700;font-size:1rem;min-width:50px;text-align:right}
.pool-score.under-par{color:#cc0000 !important}
.pool-score.over-par{color:#2563eb !important}
.pool-score.dq{color:#c0392b !important;font-size:.75rem;font-weight:600}
.pool-detail{display:none;padding:0 14px 12px;border-top:1px solid var(–card-border)}
.pool-row.expanded .pool-detail{display:block}
.pool-row.expanded{box-shadow:0 4px 14px rgba(0,0,0,.12);border-color:#006747}
.pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px}
.pick-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(–cream);border-radius:6px;font-size:.8rem}
.pick-item.counting{background:#e8f5e9;border-left:3px solid var(–masters-green)}
.pick-item.not-counting{opacity:.5}
.pick-item.mc{opacity:.45;text-decoration:line-through}
.pick-golfer{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:6px}
.pick-score{font-family:‘DM Mono’,monospace;font-weight:600;font-size:.75rem;white-space:nowrap}
.pick-score.under-par{color:var(–birdie-red)}
.pick-score.over-par{color:var(–bogey-blue)}
.pick-tier{font-size:.6rem;color:var(–text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.tb-line{margin-top:6px;font-size:.72rem;color:var(–text-muted);font-family:‘DM Mono’,monospace;text-align:right}

/* TOURNAMENT LEADERBOARD */
.lb-section{max-width:900px;margin:0 auto;padding:8px 16px 40px}
.lb-header{display:grid;grid-template-columns:44px 1fr 56px 56px;align-items:center;padding:6px 14px;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(–text-muted)}
.lb-row{background:var(–card-bg);border:1px solid var(–card-border);border-radius:8px;margin-bottom:3px;display:grid;grid-template-columns:44px 1fr 56px 56px;align-items:center;padding:9px 14px}
.lb-row.cut{opacity:.4}
.lb-pos{font-family:‘DM Mono’,monospace;font-weight:600;font-size:.78rem;color:var(–text-muted)}
.lb-name{font-weight:500;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-name.in-pool{font-weight:700;color:var(–masters-dark)}
.lb-total{font-family:‘DM Mono’,monospace;font-weight:700;font-size:.85rem;text-align:center}
.lb-total.under-par{color:var(–birdie-red)}
.lb-total.over-par{color:var(–bogey-blue)}
.lb-thru{font-family:‘DM Mono’,monospace;font-size:.75rem;text-align:center;color:var(–text-muted)}

/* LOADING / ERROR */
.loading{text-align:center;padding:60px 20px;color:var(–text-muted)}
.loading-spinner{width:32px;height:32px;border:3px solid var(–card-border);border-top-color:var(–masters-green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:30px 20px;color:var(–cut-red);font-size:.85rem}
.retry-btn{margin-top:10px;padding:8px 20px;background:var(–masters-green);color:white;border:none;border-radius:6px;cursor:pointer;font-family:‘DM Sans’,sans-serif;font-weight:600;font-size:.8rem}

/* CUT LINE */
.cut-line{text-align:center;padding:6px;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(–cut-red);border-top:1.5px dashed var(–cut-red);margin:4px 0;opacity:.6}

/* RESPONSIVE */
@media(max-width:500px){
.pick-grid{grid-template-columns:1fr}
.header h1{font-size:1.5rem}
.lb-row,.lb-header{grid-template-columns:38px 1fr 48px 48px}
}
</style>

</head>

// Name matching helpers
function normalize(n) { 
  return n.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z ]/g,'').trim(); 
}

function buildNameMap(espnNames) {
  const map = {};
  const poolNames = new Set();
  POOL_DATA.forEach(p => p.picks.forEach(g => { if(g) poolNames.add(g); }));
  
  for (const pn of poolNames) {
    const pnNorm = normalize(pn);
    // Try exact
    let match = espnNames.find(en => normalize(en) === pnNorm);
    if (!match) {
      // Try last name + first initial
      const parts = pnNorm.split(' ');
      if (parts.length >= 2) {
        const last = parts[parts.length-1];
        const firstInit = parts[0][0];
        match = espnNames.find(en => {
          const enNorm = normalize(en);
          const enParts = enNorm.split(' ');
          if (enParts.length < 2) return false;
          return enParts[enParts.length-1] === last && enParts[0][0] === firstInit;
        });
      }
    }
    if (!match) {
      // Try contains last name
      const parts = pnNorm.split(' ');
      const last = parts[parts.length-1];
      match = espnNames.find(en => normalize(en).includes(last) && normalize(en).includes(parts[0][0]));
    }
    if (match) map[pn] = match;
  }
  return map;
}

async function fetchScores() {
  let data;
  try {
    // Try direct first
    let resp = await fetch(ESPN_URL);
    if (!resp.ok) throw new Error('Direct failed');
    data = await resp.json();
  } catch(e) {
    try {
      let resp = await fetch(PROXY + encodeURIComponent(ESPN_URL));
      if (!resp.ok) throw new Error('Proxy failed');
      data = await resp.json();
    } catch(e2) {
      throw new Error('Could not reach ESPN API');
    }
  }

  // Find the Masters event
  let event = data.events?.find(e => e.id === MASTERS_EVENT_ID);
  if (!event) {
    // Fallback: find by name
    event = data.events?.find(e => e.name?.toLowerCase().includes('masters'));
  }
  if (!event) {
    // Use whatever event is available  
    event = data.events?.[0];
  }
  if (!event) throw new Error('No event data found');

  const comp = event.competitions?.[0];
  if (!comp) throw new Error('No competition data');

  competitors = comp.competitors || [];
  
  // Determine tournament status  
  const statusType = event.status?.type?.name || comp.status?.type?.name || '';
  if (statusType === 'STATUS_FINAL' || statusType === 'STATUS_PLAY_COMPLETE') {
    tournamentStatus = 'post';
  } else if (statusType === 'STATUS_IN_PROGRESS' || statusType === 'STATUS_PLAY_SUSPENDED') {
    tournamentStatus = 'in';
  } else {
    tournamentStatus = 'pre';
  }

  // Build scores
  const espnNames = competitors.map(c => c.athlete?.displayName || c.athlete?.fullName || '');
  const nameMap = buildNameMap(espnNames);

  golferScores = {};
  
  for (const c of competitors) {
    const name = c.athlete?.displayName || c.athlete?.fullName || '';
    const scoreStr = c.score || 'E';
    const scoreNum = parseScore(scoreStr);
    const pos = c.status?.position?.displayName || c.sortOrder?.toString() || '';
    const thru = c.status?.thru;
    const period = c.status?.period || c.linescores?.length || 0;
    const statusDesc = c.status?.type?.description || c.status?.type?.name || '';
    const isCut = statusDesc.toLowerCase().includes('cut') || pos.toLowerCase().includes('cut');
    const isWD = statusDesc.toLowerCase().includes('wd') || statusDesc.toLowerCase().includes('withdraw');

    let thruStr = '';
    if (thru === 18 || thru === 0) thruStr = 'F';
    else if (thru) thruStr = thru.toString();
    else if (statusDesc.toLowerCase().includes('final') || statusDesc.toLowerCase().includes('complete')) thruStr = 'F';
    else thruStr = '';

    golferScores[name] = {
      score: scoreNum,
      scoreStr: scoreStr,
      pos: pos,
      thru: thruStr,
      isCut: isCut,
      isWD: isWD,
      round: period
    };
  }

  // Map pool names to ESPN names
  for (const [poolName, espnName] of Object.entries(nameMap)) {
    if (golferScores[espnName] && poolName !== espnName) {
      golferScores[poolName] = golferScores[espnName];
    }
  }
}

function parseScore(s) {
  if (!s || s === 'E') return 0;
  s = s.toString().trim();
  if (s === 'E') return 0;
  const n = parseInt(s);
  return isNaN(n) ? null : n;
}

function formatScore(n) {
  if (n === null || n === undefined) return '--';
  if (n === 0) return 'E';
  return n > 0 ? '+' + n : n.toString();
}

function scoreClass(n) {
  if (n === null || n === undefined) return '';
  if (n < 0) return 'under-par';
  if (n > 0) return 'over-par';
  return '';
}

function computePool() {
  poolResults = POOL_DATA.map(p => {
    const pickData = p.picks.map((golfer, i) => {
      const gs = golfer ? golferScores[golfer] : null;
      return {
        name: golfer || '???',
        tier: TIERS[i],
        score: gs ? gs.score : null,
        scoreStr: gs ? gs.scoreStr : '--',
        isCut: gs ? gs.isCut : false,
        isWD: gs ? gs.isWD : false,
        thru: gs ? gs.thru : '',
        pos: gs ? gs.pos : '',
        found: !!gs
      };
    });

    // Sort picks by score (lowest first), nulls last
    const validPicks = pickData.filter(p => p.score !== null && !p.isCut && !p.isWD);
    const invalidPicks = pickData.filter(p => p.score === null || p.isCut || p.isWD);
    
    validPicks.sort((a, b) => a.score - b.score);

    const counting = validPicks.slice(0, 4);
    const notCounting = validPicks.slice(4);
    
    const isDQ = counting.length < 4;
    
    let aggregate = null;
    if (!isDQ) {
      aggregate = counting.reduce((sum, p) => sum + p.score, 0);
    }

    // Mark counting status
    const countingNames = new Set(counting.map(p => p.name));
    pickData.forEach(pd => {
      pd.counting = countingNames.has(pd.name);
    });

    return {
      name: p.name,
      picks: pickData,
      aggregate: aggregate,
      isDQ: isDQ,
      tieBreaker: p.tieBreaker,
      countingCount: counting.length
    };
  });

  // Sort: non-DQ by aggregate (low first), then tieBreaker closest to winning score
  // For tiebreaker, closer to the actual winning score wins
  const winningScore = competitors.length > 0 ? parseScore(competitors[0]?.score) : null;

  poolResults.sort((a, b) => {
    if (a.isDQ && !b.isDQ) return 1;
    if (!a.isDQ && b.isDQ) return -1;
    if (a.isDQ && b.isDQ) return 0;
    if (a.aggregate !== b.aggregate) return a.aggregate - b.aggregate;
    // Tiebreaker: closest to winning score
    if (winningScore !== null) {
      const aDiff = Math.abs(a.tieBreaker - winningScore);
      const bDiff = Math.abs(b.tieBreaker - winningScore);
      return aDiff - bDiff;
    }
    return 0;
  });

  // Assign ranks
  let rank = 1;
  for (let i = 0; i < poolResults.length; i++) {
    if (poolResults[i].isDQ) {
      poolResults[i].rank = '--';
    } else {
      if (i > 0 && !poolResults[i-1].isDQ && poolResults[i].aggregate === poolResults[i-1].aggregate) {
        poolResults[i].rank = poolResults[i-1].rank;
      } else {
        poolResults[i].rank = rank;
      }
      rank = i + 2;
    }
  }
}

function renderPool() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const container = document.getElementById('poolContainer');
  
  let filtered = poolResults;
  if (query) {
    filtered = poolResults.filter(p => {
      if (p.name.toLowerCase().includes(query)) return true;
      return p.picks.some(pk => pk.name.toLowerCase().includes(query));
    });
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">No results found</div>';
    return;
  }

  let html = '';
  for (const p of filtered) {
    const rankStr = p.rank === '--' ? '' : p.rank;
    const rankClass = typeof p.rank === 'number' && p.rank <= 3 ? 'top3' : '';
    const scoreStr = p.isDQ ? 'DQ' : formatScore(p.aggregate);
    const scoreColorClass = p.isDQ ? 'dq' : scoreClass(p.aggregate);
    const dqClass = p.isDQ ? 'dq' : '';

    let picksHtml = '';
    for (const pk of p.picks) {
      let itemClass = 'pick-item';
      if (pk.isCut || pk.isWD) itemClass += ' mc';
      else if (pk.counting) itemClass += ' counting';
      else itemClass += ' not-counting';

      const pkScoreStr = pk.isCut ? 'MC' : pk.isWD ? 'WD' : (pk.found ? formatScore(pk.score) : '--');
      const pkScoreClass = pk.isCut || pk.isWD || !pk.found ? '' : scoreClass(pk.score);
      const thruBit = pk.thru && pk.thru !== 'F' ? ` (${pk.thru})` : '';
      
      picksHtml += `<div class="${itemClass}">
        <div><span class="pick-tier">${pk.tier}</span> <span class="pick-golfer">${pk.name}</span></div>
        <span class="pick-score ${pkScoreClass}">${pkScoreStr}${thruBit}</span>
      </div>`;
    }

    html += `<div class="pool-row ${dqClass}" onclick="this.classList.toggle('expanded')">
      <div class="pool-main">
        <span class="pool-rank ${rankClass}">${rankStr}</span>
        <span class="pool-name">${p.name}</span>
        <span class="pool-score ${scoreColorClass}">${scoreStr}</span>
      </div>
      <div class="pool-detail">
        <div class="pick-grid">${picksHtml}</div>
        <div class="tb-line">TB: ${p.tieBreaker}</div>
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

function renderLeaderboard() {
  const container = document.getElementById('lbContainer');
  if (competitors.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">No leaderboard data yet</div>';
    return;
  }

  let html = '<div class="lb-header"><span>Pos</span><span>Player</span><span>Score</span><span>Thru</span></div>';
  
  let cutShown = false;
  
  for (const c of competitors) {
    const name = c.athlete?.displayName || c.athlete?.fullName || '';
    const scoreStr = c.score || 'E';
    const scoreNum = parseScore(scoreStr);
    const pos = c.status?.position?.displayName || c.sortOrder?.toString() || '';
    const statusDesc = c.status?.type?.description || c.status?.type?.name || '';
    const isCut = statusDesc.toLowerCase().includes('cut') || pos.toLowerCase().includes('cut');
    const thru = c.status?.thru;

    let thruStr = '';
    if (thru === 18 || thru === 0) thruStr = 'F';
    else if (thru) thruStr = thru.toString();
    else if (statusDesc.toLowerCase().includes('final') || statusDesc.toLowerCase().includes('complete')) thruStr = 'F';
    
    if (isCut && !cutShown) {
      html += '<div class="cut-line">Projected Cut</div>';
      cutShown = true;
    }

    const inPool = allPoolGolfers.has(normalize(name));
    const nameClass = inPool ? 'lb-name in-pool' : 'lb-name';
    const cutClass = isCut ? 'cut' : '';
    const totalClass = scoreClass(scoreNum);

    html += `<div class="lb-row ${cutClass}">
      <span class="lb-pos">${pos}</span>
      <span class="${nameClass}">${name}</span>
      <span class="lb-total ${totalClass}">${scoreStr}</span>
      <span class="lb-thru">${thruStr}</span>
    </div>`;
  }

  container.innerHTML = html;
}

function updateStatus() {
  const badge = document.getElementById('statusBadge');
  const updated = document.getElementById('lastUpdated');
  
  if (tournamentStatus === 'post') {
    badge.textContent = 'Final';
    badge.className = 'header-status status-final';
  } else if (tournamentStatus === 'in') {
    badge.textContent = '● Live';
    badge.className = 'header-status status-live';
  } else {
    badge.textContent = 'Starts Today';
    badge.className = 'header-status status-pre';
  }

  const now = new Date();
  updated.textContent = 'Updated ' + now.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('poolView').style.display = tab === 'pool' ? '' : 'none';
  document.getElementById('lbView').style.display = tab === 'leaderboard' ? '' : 'none';
}

async function init() {
  try {
    await fetchScores();
    computePool();
    renderPool();
    renderLeaderboard();
    updateStatus();
  } catch(e) {
    document.getElementById('poolContainer').innerHTML = `
      <div class="error-msg">
        ${e.message}<br>
        <button class="retry-btn" onclick="init()">Retry</button>
      </div>`;
    // Still compute pool with no scores
    computePool();
    renderPool();
  }
}

// Auto-refresh every 60s during tournament
setInterval(async () => {
  if (tournamentStatus === 'in') {
    try {
      await fetchScores();
      computePool();
      renderPool();
      renderLeaderboard();
      updateStatus();
    } catch(e) {}
  }
}, 60000);

init();
</script>
